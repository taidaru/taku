name: release

# Release-only workflow: runs solely for version tags (and manual dispatch).
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest, target: x86_64-unknown-linux-gnu }
          - { os: macos-latest, target: aarch64-apple-darwin }
          - { os: windows-latest, target: x86_64-pc-windows-msvc }
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release -p taku --target ${{ matrix.target }}

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: tar -C target/${{ matrix.target }}/release -czf taku-${{ matrix.target }}.tar.gz taku

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: >
          Compress-Archive
          -Path target/${{ matrix.target }}/release/taku.exe
          -DestinationPath taku-${{ matrix.target }}.zip
          -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: taku-${{ matrix.target }}
          path: taku-${{ matrix.target }}*

  release:
    name: publish release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Checksums
        run: cd dist && sha256sum taku-* > SHA256SUMS

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*

  scoop:
    name: scoop manifest
    needs: release
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: taku-x86_64-pc-windows-msvc
          path: dist

      - name: Update manifest
        run: |
          tag="$GITHUB_REF_NAME"
          version="${tag#v}"
          zip="dist/taku-x86_64-pc-windows-msvc.zip"
          hash="$(sha256sum "$zip" | cut -d' ' -f1)"
          url="https://github.com/$GITHUB_REPOSITORY/releases/download/$tag/taku-x86_64-pc-windows-msvc.zip"
          jq --arg v "$version" --arg u "$url" --arg h "$hash" \
            '.version = $v | .architecture."64bit".url = $u | .architecture."64bit".hash = $h' \
            bucket/taku.json > bucket/taku.json.tmp
          mv bucket/taku.json.tmp bucket/taku.json

      - name: Commit manifest
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add bucket/taku.json
          git diff --cached --quiet || git commit -m "scoop: update manifest to $GITHUB_REF_NAME"
          git push
